<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpotDL</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <div class="panel entry">
          <div class="title-row">
            <div>
              <p class="eyebrow">Local downloader</p>
              <h1>SpotDL</h1>
            </div>
            <span id="health" class="status-pill">Checking</span>
          </div>

          <form id="download-form" class="download-form">
            <label class="query-label" for="query">Spotify URL or search</label>
            <textarea
              id="query"
              name="query"
              rows="4"
              placeholder="https://open.spotify.com/track/..."
              required
            ></textarea>

            <div class="controls">
              <label>
                Format
                <select id="format" name="format">
                  <option value="mp3">MP3</option>
                  <option value="m4a">M4A</option>
                  <option value="flac">FLAC</option>
                  <option value="ogg">OGG</option>
                  <option value="opus">OPUS</option>
                  <option value="wav">WAV</option>
                </select>
              </label>

              <label>
                Bitrate
                <select id="bitrate" name="bitrate">
                  <option value="128k">128k</option>
                  <option value="160k">160k</option>
                  <option value="192k">192k</option>
                  <option value="256k">256k</option>
                  <option value="320k">320k</option>
                  <option value="auto">Auto</option>
                  <option value="disable">Disable</option>
                </select>
              </label>

              <label>
                Existing
                <select id="overwrite" name="overwrite">
                  <option value="skip">Skip</option>
                  <option value="force">Replace</option>
                  <option value="metadata">Metadata</option>
                </select>
              </label>
            </div>

            <button id="submit" type="submit">Download</button>
          </form>
        </div>

        <div class="panel monitor">
          <div class="title-row">
            <div>
              <p class="eyebrow">Current job</p>
              <h2 id="job-title">Idle</h2>
            </div>
            <span id="job-state" class="status-pill muted">Ready</span>
          </div>
          <pre id="log" aria-live="polite">Waiting for a download.</pre>
        </div>
      </section>

      <section class="panel library">
        <div class="title-row">
          <div>
            <p class="eyebrow">Saved locally</p>
            <h2>Downloads</h2>
          </div>
          <button id="refresh" class="secondary" type="button">Refresh</button>
        </div>
        <div id="files" class="files"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
